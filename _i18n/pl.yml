about:
  section: about
  tag: O Nas
  title: "Nowa definicja inteligencji na brzegu sieci"
  text: "Tworzymy urządzenia, które przenoszą moc obliczeniową chmury do rzeczywistego świata."
  body: >
    Tworzymy urządzenia, które przenoszą moc obliczeniową chmury do rzeczywistego świata.
    Global Storm projektuje odporne platformy, które działają w najtrudniejszych warunkach, łącząc systemy wbudowane z rozwiązaniami chmurowymi, aby przesuwać granice inteligencji na sam brzeg sieci.

