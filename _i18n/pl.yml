hero:
  title: Global Storm
  subtitle: Inteligencja na brzegu sieci.
  description: Odporna inteligencja na brzegu sieci dla środowisk, gdzie łączność płazi. Przetwarzanie z opóźnieniem poniższym niż 10 ms dla przemysłowego IoT, inteligentnych miast i kluczowej infrastruktury.
  cta: Poznaj Technologię
  secondary_cta: Zobacz Produkty

edge_device:
  section: edge-device
  tag: Co Budujemy
  title: "Inteligencja na miejscu"
  text: "Większość sprzętu edge wysyła dane do chmury do przetworzenia. Nasz sprzęt myśli lokalnie — w milisekundach, bez łączności, w dowolnym środowisku."
  list:
    - icon: "fas fa-industry"
      title: "Automatyzacja przemysłowa"
      desc: "Reaguj błyskawicznie na dane z maszyn — <5ms opóźnienia, w pełni na urządzeniu."
    - icon: "fas fa-truck-moving"
      title: "Monitorowanie flot i pojazdów"
      desc: "Analizuj dane z pojazdów w czasie rzeczywistym — telematyka na żywo dla 1,000+ węzłów."
    - icon: "fas fa-microchip"
      title: "IoT i czujniki zdalne"
      desc: "Skalowalne obliczenia dla odłączonych środowisk — działa w zakresie -40°C do 85°C, bez zależności od chmury."
    - icon: "fas fa-bus"
      title: "Transport publiczny"
      desc: "Zoptymalizuj mobilność publiczną z lokalną inteligencją — 99.9% dostępności w środowiskach terenowych."
    - icon: "fas fa-city"
      title: "Inteligentne miasta"
      desc: "Podnieś bezpieczeństwo i efektywność — zdecentralizowane przetwarzanie w miejskich sieciach sensorowych."
    - icon: "fas fa-shield-alt"
      title: "Bezpieczeństwo i zgodność"
      desc: "Chroń dane na brzegu sieci — AES-256 szyfrowanie, zero-trust, zgodność FIPS 140-3."

