edge_device:
  section: edge-device
  tag: Edge Computing
  title: "Security-First Edge Platforms"
  text: "Global Storm edge devices are engineered for the harshest environments — military-grade hardening, tamper-resistant enclosures, and end-to-end encrypted pipelines that keep your data safe from device to cloud. Smarter, safer, faster — right at the edge."
  list:
    - icon: "fas fa-shield-alt"
      title: "Security-First"
      desc: "Military-grade hardening and end-to-end encryption from device to cloud — tamper-resistant enclosures and zero-trust connectivity."
    - icon: "fas fa-industry"
      title: "Industrial Automation"
      desc: "Instantly respond to machine data for minimized downtime and optimized production."
    - icon: "fas fa-truck-moving"
      title: "Fleet & Vehicle Monitoring"
      desc: "Analyze movement and performance in real time, even in remote areas."
    - icon: "fas fa-microchip"
      title: "IoT & Remote Sensors"
      desc: "Scalable edge computing for devices everywhere — low power, high efficiency."
    - icon: "fas fa-bus"
      title: "Public Transport Systems"
      desc: "Deliver adaptive public mobility with hyper-local intelligence."
    - icon: "fas fa-city"
      title: "Connected Smart Cities"
      desc: "Enhance safety and sustainability with decentralized data processing."

