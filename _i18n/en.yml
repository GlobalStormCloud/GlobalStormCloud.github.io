edge_device:
  section: edge-device
  tag: What We Build
  title: "Intelligence, On-Site"
  text: "Most edge hardware ships data to the cloud to think. Ours thinks on-site — in milliseconds, without connectivity, in any environment."
  list:
    - icon: "fas fa-shield-alt"
      title: "Security-First"
      desc: "Military-grade hardening and end-to-end encryption from device to cloud — tamper-resistant enclosures and zero-trust connectivity."
    - icon: "fas fa-industry"
      title: "Industrial Automation"
      desc: "Instantly respond to machine data — <5ms response latency, fully on-device."
    - icon: "fas fa-truck-moving"
      title: "Fleet & Vehicle Monitoring"
      desc: "Analyze movement and performance in real time — live telemetry across 1,000+ nodes."
    - icon: "fas fa-microchip"
      title: "IoT & Remote Sensors"
      desc: "Scalable edge computing for disconnected environments — operates at -40°C to 85°C, zero cloud dependency."
    - icon: "fas fa-bus"
      title: "Public Transport Systems"
      desc: "Deliver adaptive public mobility with hyper-local intelligence — 99.9% uptime in field-deployed environments."
    - icon: "fas fa-city"
      title: "Connected Smart Cities"
      desc: "Enhance safety and sustainability — decentralized processing across city-scale sensor networks."

