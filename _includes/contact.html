<section class="section contact" id="{{ site.translations[site.lang].contact.section }}">
  <div class="container">
    <div class="section__header reveal">
      <span class="section__tag">{{ site.translations[site.lang].contact.tag }}</span>
      <h2 class="section__title">{{ site.translations[site.lang].contact.title }}</h2>
      <p class="section__subtitle">{{ site.translations[site.lang].contact.text }}</p>
    </div>
    <div class="contact__grid reveal" data-delay="200">
      <form id="contactForm" class="contact__form gform pure-form-stacked" method="POST"
        action="https://script.google.com/macros/s/AKfycbwYfg6kxvduAZ4vsNsrymGteEi8uPcexuvDI9Sfq_7yFCpSn7LOj5LLO0dlY1pHDk4cTQ/exec">
        <div class="contact__fields">
          <div class="contact__field">
            <input name="name" id="name" type="text"
              placeholder="{{ site.translations[site.lang].contact.name }}"
              required aria-label="{{ site.translations[site.lang].contact.name }}">
          </div>
          <div class="contact__field">
            <input name="email" id="email" type="email"
              placeholder="{{ site.translations[site.lang].contact.email }}"
              required aria-label="{{ site.translations[site.lang].contact.email }}">
          </div>
          <div class="contact__field">
            <input name="phone" id="phone" type="tel"
              placeholder="{{ site.translations[site.lang].contact.phone }}"
              aria-label="{{ site.translations[site.lang].contact.phone }}">
          </div>
          <div class="contact__field contact__field--full">
            <textarea name="message" id="message" rows="5"
              placeholder="{{ site.translations[site.lang].contact.message }}"
              required aria-label="{{ site.translations[site.lang].contact.message }}"></textarea>
          </div>
          <input type="hidden" name="subject" value="{{ site.translations[site.lang].contact.subject }}">
          <fieldset class="honeypot-field" style="display:none;">
            <label for="honeypot">Leave this field empty</label>
            <input id="honeypot" type="text" name="honeypot" />
          </fieldset>
        </div>
         <div class="contact__actions">
           <div id="form_success" class="contact__alert contact__alert--success" style="display:none">
             {{ site.translations[site.lang].contact.success }}
           </div>
           <div id="form_failure" class="contact__alert contact__alert--error" style="display:none">
             {{ site.translations[site.lang].contact.failure }}
           </div>
           <button id="sendMessageButton" class="btn btn-primary" type="submit">
             <span class="btn-text">{{ site.translations[site.lang].contact.submit }}</span>
             <span class="contact__spinner"></span>
           </button>
         </div>
      </form>

    </div>
  </div>
</section>
