<footer class="footer">
  <div class="container">
    <div class="footer__inner">
      <div class="footer__brand">
        <a class="nav__logo" href="#hero">
          <img src="{{ "/assets/img/logo_with_text_white.png" | relative_url }}" alt="Global Storm">
        </a>
        <p class="footer__tagline">{{ site.translations[site.lang].footer.tagline }}</p>
      </div>
      <div class="footer__social">
        <ul>
          {% for link in site.translations[site.lang].footer.social %}
          <li>
            <a href="{{ link.url }}" target="_blank" rel="noopener" aria-label="{{ link.icon | replace: 'fab fa-', '' }}">
              <i class="{{ link.icon }}"></i>
            </a>
          </li>
          {% endfor %}
        </ul>
      </div>
      <div class="footer__legal">
        <a href="{{ site.translations[site.lang].privacy_link | default: '/legal' }}">{{ site.translations[site.lang].footer.legal }}</a>
      </div>
    </div>
    <div class="footer__copyright">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. {{ site.translations[site.lang].footer.rights }}</p>
    </div>
  </div>
</footer>
