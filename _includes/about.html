<section class="section about" id="{{ site.translations[site.lang].about.section }}">
  <div class="container">
    <div class="about__grid">
      <div class="about__visual reveal">
        <div class="about__stat-card">
          <span class="about__stat-label">Operating Temp</span>
          <span class="about__stat-value">-40–85</span>
          <span class="about__stat-unit">°C</span>
        </div>
        <div class="about__stat-card">
          <span class="about__stat-label">Encryption</span>
          <span class="about__stat-value">AES</span>
          <span class="about__stat-unit">256-bit</span>
        </div>
      </div>
      <div class="about__content reveal" data-delay="200">
        <span class="section__tag">{{ site.translations[site.lang].about.tag }}</span>
        <h2 class="section__title">{{ site.translations[site.lang].about.title }}</h2>
        <p class="about__lead">{{ site.translations[site.lang].about.text }}</p>
        <div class="about__body">
          {{ site.translations[site.lang].about.body | markdownify }}
        </div>
      </div>
    </div>
  </div>
</section>
