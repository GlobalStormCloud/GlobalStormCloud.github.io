<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="container nav__inner">
    <a class="nav__logo" href="#hero">
      <img src="{{ "/assets/img/logo_with_text_white.png" | relative_url }}" alt="Global Storm">
    </a>
    <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links" role="menubar">
      {% assign nav_data = site.translations[site.lang].navigation %}
      {% for link in nav_data %}
      <li role="none">
        {% if link.section %}
        <a class="nav-link" href="#{{ link.section }}" role="menuitem">{{ link.title }}</a>
        {% elsif link.url %}
        <a class="nav-link" href="{{ link.url }}" role="menuitem">{{ link.title }}</a>
        {% endif %}
      </li>
      {% endfor %}
      <li class="nav__lang">
        {% if site.lang == "en" %}
        <a href="{{ site.baseurl_root }}/pl{{ page.url | replace:'index.html','' }}" aria-label="Przełącz na Polski">
          <span class="lang-label">PL</span>
        </a>
        {% elsif site.lang == "pl" %}
        <a href="{{ site.baseurl_root }}{{ page.url | replace:'index.html','' }}" aria-label="Switch to English">
          <span class="lang-label">EN</span>
        </a>
        {% endif %}
      </li>
    </ul>
  </div>
</nav>
